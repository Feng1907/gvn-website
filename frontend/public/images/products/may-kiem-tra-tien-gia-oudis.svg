<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f0fb"/>
      <stop offset="100%" style="stop-color:#d0e4f8"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Device base -->
  <rect x="110" y="200" width="180" height="12" rx="4" fill="#888"/>
  <!-- Device body -->
  <rect x="120" y="100" width="160" height="110" rx="8" fill="#333"/>
  <rect x="124" y="104" width="152" height="102" rx="6" fill="#2a2a2a"/>
  <!-- UV light panel -->
  <rect x="130" y="112" width="140" height="50" rx="4" fill="#0a0015"/>
  <rect x="134" y="116" width="132" height="42" rx="2" fill="#14003a"/>
  <!-- UV glow effect -->
  <ellipse cx="200" cy="137" rx="55" ry="16" fill="#7b1fa2" opacity="0.6"/>
  <ellipse cx="200" cy="137" rx="35" ry="10" fill="#9c27b0" opacity="0.5"/>
  <text x="200" y="142" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#ce93d8" text-anchor="middle">UV LIGHT</text>
  <!-- White LED -->
  <rect x="130" y="170" width="60" height="24" rx="4" fill="#fff9c4"/>
  <ellipse cx="160" cy="182" rx="22" ry="8" fill="white" opacity="0.8"/>
  <text x="160" y="186" font-family="Arial,sans-serif" font-size="8" fill="#555" text-anchor="middle">WHITE LED</text>
  <!-- MG sensor area -->
  <rect x="198" y="170" width="72" height="24" rx="4" fill="#1a237e"/>
  <text x="234" y="186" font-family="Arial,sans-serif" font-size="9" fill="#90caf9" text-anchor="middle">MG SENSOR</text>
  <!-- Banknote slot -->
  <rect x="124" y="190" width="152" height="14" rx="3" fill="#1a1a1a"/>
  <rect x="128" y="192" width="144" height="10" rx="2" fill="#111"/>
  <text x="200" y="201" font-family="Arial,sans-serif" font-size="8" fill="#888" text-anchor="middle">ĐẶT TIỀN VÀO ĐÂY</text>
  <!-- Detection methods badges -->
  <g>
    <rect x="120" y="220" width="32" height="22" rx="4" fill="#6a1b9a"/>
    <text x="136" y="235" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">UV</text>
    <rect x="157" y="220" width="32" height="22" rx="4" fill="#1565c0"/>
    <text x="173" y="235" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">MG</text>
    <rect x="194" y="220" width="32" height="22" rx="4" fill="#2e7d32"/>
    <text x="210" y="235" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">WM</text>
    <rect x="231" y="220" width="32" height="22" rx="4" fill="#c62828"/>
    <text x="247" y="235" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle">IR</text>
  </g>
  <!-- Brand -->
  <text x="200" y="266" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#1a237e" text-anchor="middle">OUDIS 9988T</text>
  <!-- Bottom info -->
  <rect x="0" y="285" width="400" height="115" fill="rgba(26,35,126,0.9)"/>
  <text x="200" y="310" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="white" text-anchor="middle">Máy kiểm tra tiền giả</text>
  <text x="200" y="330" font-family="Arial,sans-serif" font-size="12" fill="#90caf9" text-anchor="middle">Oudis 9988T</text>
  <text x="200" y="350" font-family="Arial,sans-serif" font-size="11" fill="#7986cb" text-anchor="middle">UV · MG · WM · IR · 4 phương pháp</text>
  <text x="200" y="368" font-family="Arial,sans-serif" font-size="11" fill="#7986cb" text-anchor="middle">Đèn LED trắng · Nhỏ gọn để bàn</text>
  <text x="200" y="386" font-family="Arial,sans-serif" font-size="11" fill="#9fa8da" text-anchor="middle">Bảo hành 12 tháng</text>
</svg>
