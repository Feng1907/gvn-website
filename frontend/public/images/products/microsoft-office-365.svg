<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff3e0"/>
      <stop offset="100%" style="stop-color:#ffe0b2"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- App icons grid -->
  <!-- Word -->
  <rect x="68" y="90" width="72" height="72" rx="10" fill="#2b579a"/>
  <text x="104" y="142" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">W</text>
  <!-- Excel -->
  <rect x="164" y="90" width="72" height="72" rx="10" fill="#217346"/>
  <text x="200" y="142" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">X</text>
  <!-- PowerPoint -->
  <rect x="260" y="90" width="72" height="72" rx="10" fill="#d24726"/>
  <text x="296" y="142" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">P</text>
  <!-- Teams -->
  <rect x="68" y="178" width="72" height="72" rx="10" fill="#6264a7"/>
  <text x="104" y="230" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">T</text>
  <!-- OneDrive -->
  <rect x="164" y="178" width="72" height="72" rx="10" fill="#0078d4"/>
  <text x="200" y="230" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">☁</text>
  <!-- Outlook -->
  <rect x="260" y="178" width="72" height="72" rx="10" fill="#0078d4"/>
  <text x="296" y="230" font-family="Arial,sans-serif" font-size="38" font-weight="900" fill="white" text-anchor="middle">O</text>
  <!-- Microsoft 365 label -->
  <rect x="70" y="270" width="260" height="38" rx="6" fill="white"/>
  <text x="200" y="285" font-family="'Segoe UI',Arial,sans-serif" font-size="12" fill="#737373" text-anchor="middle">Microsoft</text>
  <text x="200" y="302" font-family="'Segoe UI',Arial,sans-serif" font-size="16" font-weight="bold" fill="#d83b01" text-anchor="middle">365 Business</text>
  <!-- Bottom info -->
  <rect x="0" y="325" width="400" height="75" fill="rgba(216,59,1,0.9)"/>
  <text x="200" y="348" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Microsoft 365 Business</text>
  <text x="200" y="366" font-family="Arial,sans-serif" font-size="11" fill="#ffe0cc" text-anchor="middle">Word · Excel · PPT · Teams · OneDrive</text>
  <text x="200" y="383" font-family="Arial,sans-serif" font-size="11" fill="#ffe0cc" text-anchor="middle">1TB OneDrive · 1 năm / 1 người dùng</text>
</svg>
