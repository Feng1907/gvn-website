<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e3f2fd"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Printer body -->
  <rect x="100" y="100" width="200" height="180" rx="12" fill="#f5f5f5"/>
  <rect x="104" y="104" width="192" height="172" rx="10" fill="#eeeeee"/>
  <!-- Paper exit slot -->
  <rect x="115" y="116" width="170" height="18" rx="4" fill="#ddd"/>
  <rect x="118" y="118" width="164" height="14" rx="3" fill="#ccc"/>
  <!-- Paper strip coming out -->
  <rect x="145" y="108" width="110" height="30" rx="1" fill="white"/>
  <rect x="155" y="112" width="30" height="3" rx="1" fill="#ddd"/>
  <rect x="155" y="118" width="60" height="3" rx="1" fill="#ddd"/>
  <rect x="155" y="124" width="45" height="3" rx="1" fill="#ddd"/>
  <!-- Control panel -->
  <rect x="115" y="145" width="170" height="60" rx="6" fill="#e0e0e0"/>
  <!-- Power LED -->
  <circle cx="130" cy="162" r="6" fill="#00e676"/>
  <text x="140" y="166" font-family="Arial,sans-serif" font-size="8" fill="#555">POWER</text>
  <!-- Error LED -->
  <circle cx="130" cy="182" r="6" fill="#ff5722"/>
  <text x="140" y="186" font-family="Arial,sans-serif" font-size="8" fill="#555">ERROR</text>
  <!-- Feed button -->
  <rect x="230" y="150" width="44" height="26" rx="6" fill="#1565c0"/>
  <text x="252" y="167" font-family="Arial,sans-serif" font-size="9" fill="white" text-anchor="middle">FEED</text>
  <!-- Ports bottom -->
  <rect x="125" y="218" width="150" height="40" rx="4" fill="#ddd"/>
  <rect x="135" y="224" width="18" height="12" rx="2" fill="#888"/>
  <rect x="160" y="224" width="18" height="12" rx="2" fill="#888"/>
  <rect x="185" y="224" width="28" height="12" rx="2" fill="#888"/>
  <text x="144" y="244" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">USB</text>
  <text x="169" y="244" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">SER</text>
  <text x="199" y="244" font-family="Arial,sans-serif" font-size="7" fill="#666" text-anchor="middle">LAN</text>
  <!-- Epson logo -->
  <text x="200" y="292" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#003087" text-anchor="middle">EPSON</text>
  <text x="200" y="308" font-family="Arial,sans-serif" font-size="11" fill="#0055a5" text-anchor="middle">TM-T82III</text>
  <!-- Bottom info -->
  <rect x="0" y="325" width="400" height="75" fill="rgba(0,48,135,0.9)"/>
  <text x="200" y="347" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Epson TM-T82III</text>
  <text x="200" y="364" font-family="Arial,sans-serif" font-size="11" fill="#90caf9" text-anchor="middle">250mm/s · 80mm · USB+Serial+LAN</text>
  <text x="200" y="381" font-family="Arial,sans-serif" font-size="11" fill="#90caf9" text-anchor="middle">ESC/POS · Bảo hành 12 tháng</text>
</svg>
