<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f5e9"/>
      <stop offset="100%" style="stop-color:#c8e6c9"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2e7d32"/>
      <stop offset="100%" style="stop-color:#1b5e20"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M200,75 L310,115 L310,210 Q310,285 200,335 Q90,285 90,210 L90,115 Z" fill="url(#shield)"/>
  <path d="M200,90 L295,126 L295,210 Q295,275 200,318 Q105,275 105,210 L105,126 Z" fill="#388e3c"/>
  <!-- K logo -->
  <text x="200" y="210" font-family="Arial,sans-serif" font-size="80" font-weight="900" fill="white" text-anchor="middle" dominant-baseline="middle">K</text>
  <!-- Shield shine -->
  <ellipse cx="165" cy="148" rx="20" ry="12" fill="rgba(255,255,255,0.15)" transform="rotate(-20,165,148)"/>
  <!-- Kaspersky text -->
  <rect x="80" y="345" width="240" height="30" rx="5" fill="#1b5e20"/>
  <text x="200" y="365" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">KASPERSKY</text>
  <!-- Bottom info -->
  <text x="200" y="386" font-family="Arial,sans-serif" font-size="11" fill="#2e7d32" text-anchor="middle">Internet Security · Bảo vệ toàn diện</text>
</svg>
