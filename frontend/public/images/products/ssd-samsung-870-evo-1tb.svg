<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8f4f8"/>
      <stop offset="100%" style="stop-color:#d0e8f0"/>
    </linearGradient>
    <linearGradient id="ssd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- SSD body -->
  <rect x="70" y="110" width="260" height="170" rx="12" fill="url(#ssd)"/>
  <rect x="74" y="114" width="252" height="162" rx="10" fill="#1c1c1c"/>
  <!-- Samsung logo area -->
  <rect x="90" y="128" width="160" height="30" rx="4" fill="transparent"/>
  <text x="170" y="150" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#1428a0" text-anchor="middle">SAMSUNG</text>
  <!-- SSD label -->
  <rect x="90" y="167" width="220" height="58" rx="6" fill="#0d47a1"/>
  <text x="200" y="190" font-family="Arial,sans-serif" font-size="20" font-weight="900" fill="white" text-anchor="middle">870 EVO</text>
  <text x="200" y="212" font-family="Arial,sans-serif" font-size="13" fill="#90caf9" text-anchor="middle">1 TB  ·  SATA 6Gb/s</text>
  <!-- Connector notch -->
  <rect x="284" y="255" width="36" height="14" rx="3" fill="#555"/>
  <g fill="#888">
    <rect x="288" y="258" width="4" height="8" rx="1"/>
    <rect x="295" y="258" width="4" height="8" rx="1"/>
    <rect x="302" y="258" width="4" height="8" rx="1"/>
    <rect x="309" y="258" width="4" height="8" rx="1"/>
    <rect x="316" y="258" width="4" height="8" rx="1"/>
  </g>
  <!-- Bottom info -->
  <rect x="0" y="305" width="400" height="95" fill="rgba(26,72,161,0.15)"/>
  <text x="200" y="331" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Samsung 870 EVO 1TB</text>
  <text x="200" y="352" font-family="Arial,sans-serif" font-size="12" fill="#0d47a1" text-anchor="middle">Đọc: 560 MB/s · Ghi: 530 MB/s</text>
  <text x="200" y="370" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="middle">V-NAND 3-bit MLC · 2.5" SATA III</text>
  <text x="200" y="388" font-family="Arial,sans-serif" font-size="11" fill="#555" text-anchor="middle">Bảo hành 5 năm</text>
</svg>
